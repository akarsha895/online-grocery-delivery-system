<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - FreshMart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/signup.css" />
  </head>

  <body class="signup-page">
    <div class="navbar">
      <div class="nav-logo">
        <a href="index.html">FreshMart</a>
      </div>

      <div class="search-bar">
        <input type="text" placeholder="Search for groceries..." />
        <button class="btn">Search</button>
      </div>

      <div class="nav-links" id="nav-links"></div>

      <div class="nav-user" id="nav-user"></div>
    </div>

    <div class="signup-wrapper">
      <div class="signup-card">
        <h1 class="signup-title">Create Account</h1>
        <form class="signup-form" method="get">
          <label class="signup-label">Full Name</label>
          <input
            class="signup-input"
            type="text"
            placeholder="Enter your full name"
            required
          />

          <label class="signup-label">Email</label>
          <input
            class="signup-input"
            type="email"
            placeholder="Enter your email"
            required
          />

          <label class="signup-label">Phone</label>
          <input
            class="signup-input"
            type="text"
            placeholder="Enter phone number"
            required
          />

          <label class="signup-label">Address</label>
          <textarea
            class="signup-textarea"
            placeholder="Enter your delivery address"
            required
          ></textarea>

          <label class="signup-label">Password</label>
          <input
            class="signup-input"
            type="password"
            placeholder="Create password"
            required
          />

          <button type="submit" class="btn signup-btn">Sign Up</button>
        </form>

        <p class="signup-login-text">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </div>
    </div>

    <footer>
      <p>© 2026 FreshMart Grocery Delivery</p>
    </footer>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
