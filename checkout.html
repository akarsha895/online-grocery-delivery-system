<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/checkout.css">
</head>

<body>

<!-- Navbar -->

<div class="navbar">
<h2>FreshMart</h2>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html" class="active">Cart</a>
<a href="login.html">Login</a>
<a href="sign-up.html">Sign Up</a>
</div>
</div>


<div class="container">

<h1 class="page-title">Checkout</h1>

<div class="checkout-container">

<!-- LEFT SECTION -->

<div class="checkout-left">

<h2 class="checkout-section-title">Delivery Address</h2>

<div class="address-list">

<label class="address-card">
<input type="radio" name="address">
<span>Indiranagar, Bangalore – 560038</span>
</label>

<label class="address-card">
<input type="radio" name="address">
<span>Whitefield, Bangalore – 560066</span>
</label>

</div>

<div class="new-address-box">

<h3>Add New Address</h3>

<textarea class="checkout-textarea"
placeholder="Enter full delivery address">
</textarea>

<button class="btn add-address-btn">
Insert Address
</button>

</div>


<h2 class="checkout-section-title">Payment Method</h2>

<div class="payment-list">

<label class="payment-card">
<input type="radio" name="payment">
<span>UPI</span>
</label>

<label class="payment-card">
<input type="radio" name="payment">
<span>Credit / Debit Card</span>
</label>

<label class="payment-card">
<input type="radio" name="payment">
<span>Cash on Delivery</span>
</label>

</div>

</div>


<!-- RIGHT SECTION -->

<div class="checkout-right">

<h2>Order Summary</h2>

<div class="checkout-summary-row">
<span>Items</span>
<span>2</span>
</div>

<div class="checkout-summary-row">
<span>Subtotal</span>
<span>₹355</span>
</div>

<div class="checkout-summary-row">
<span>Delivery Fee</span>
<span>₹30</span>
</div>

<hr>

<div class="checkout-summary-row total">
<span>Total</span>
<span>₹385</span>
</div>

<a href="order-confirmation.html">
<button class="btn place-order-btn">
Place Order
</button>
</a>

</div>

</div>

</div>


<footer>
<p>© 2026 FreshMart Grocery Delivery</p>
</footer>

</body>
</html>
