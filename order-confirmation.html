<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmation</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/order.css" />
  </head>

  <body>
    <div class="navbar">
      <div class="nav-logo">
        <a href="index.html">FreshMart</a>
      </div>

      <div class="search-bar">
        <input type="text" placeholder="Search for groceries..." />
        <button class="btn">Search</button>
      </div>

      <div class="nav-links" id="nav-links"></div>
      <div class="nav-user" id="nav-user"></div>
    </div>

    <div class="container">
      <div class="order-confirmation-box">
        <h1 class="success-title">Order Placed Successfully!</h1>

        <p class="success-message">
          Thank you for shopping with FreshMart. Your order has been confirmed.
        </p>

        <div class="order-details" id="order-details"></div>

        <h2 class="summary-title">Order Summary</h2>

        <div class="order-summary-list" id="order-summary"></div>

        <div class="confirmation-buttons">
          <a href="products.html">
            <button class="btn">Continue Shopping</button>
          </a>

          <a href="index.html">
            <button class="secondary-btn">Back to Home</button>
          </a>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; <span id="year"></span> FreshMart Grocery Delivery</p>
    </footer>

    <script src="js/order.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
