<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - FreshMart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body class="login-page">
    <div class="navbar">
      <div class="nav-logo">
        <a href="index.html">FreshMart</a>
      </div>
    </div>

    <div class="login-wrapper">
      <div class="login-box">
        <h1 class="login-heading">Welcome</h1>

        <form class="login-form" method="get">
          <label class="login-label">Email</label>
          <input
            class="login-input"
            type="email"
            placeholder="Enter your email"
            required
          />

          <label class="login-label">Password</label>
          <input
            class="login-input"
            type="password"
            placeholder="Enter your password"
            required
          />

          <button type="submit" class="btn login-submit-btn">Login</button>
        </form>

        <p class="login-signup-text">
          Don't have an account?
          <a href="sign-up.html">Sign Up</a>
        </p>
      </div>
    </div>

    <footer>
      <p>&copy; <span id="year"></span> FreshMart Grocery Delivery</p>
    </footer>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
