<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/checkout.css" />
  </head>

  <body>
    <div class="navbar">
      <div class="nav-logo">
        <a href="index.html">FreshMart</a>
      </div>

      <div class="search-bar">
        <input type="text" placeholder="Search for groceries..." />
        <button class="btn">Search</button>
      </div>

      <div class="nav-links" id="nav-links"></div>
      <div class="nav-user" id="nav-user"></div>
    </div>

    <div class="container">
      <h1 class="page-title">Checkout</h1>

      <div class="checkout-container">
        <div class="checkout-left">
          <h2 class="checkout-section-title">Delivery Address</h2>

          <div class="address-list" id="address-list"></div>

          <div class="new-address-box">
            <h3>Add New Address</h3>

            <textarea
              id="new-address"
              class="checkout-textarea"
              placeholder="Enter full delivery address"
            >
            </textarea>

            <button id="add-address-btn" class="btn add-address-btn">
              Insert Address
            </button>
          </div>

          <h2 class="checkout-section-title">Payment Method</h2>

          <div class="payment-list">
            <label class="payment-card">
              <input type="radio" name="payment" />
              <span>UPI</span>
            </label>

            <label class="payment-card">
              <input type="radio" name="payment" />
              <span>Credit / Debit Card</span>
            </label>

            <label class="payment-card">
              <input type="radio" name="payment" />
              <span>Cash on Delivery</span>
            </label>
          </div>
        </div>

        <div class="checkout-right">
          <h2>Order Summary</h2>

          <div class="checkout-summary-row">
            <span>Items</span>
            <span id="item-count">0</span>
          </div>

          <div class="checkout-summary-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
          </div>

          <div class="checkout-summary-row">
            <span>Delivery Fee</span>
            <span id="delivery-fee">₹30</span>
          </div>

          <hr />

          <div class="checkout-summary-row total">
            <span>Total</span>
            <span id="total">₹0</span>
          </div>

          <button class="btn place-order-btn" id="place-order-btn">
            Place Order
          </button>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 FreshMart Grocery Delivery</p>
    </footer>

    <script src="js/checkout.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
